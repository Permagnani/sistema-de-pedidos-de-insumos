<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Formatação de Pedido para Impressão</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="../assets/css/formatar-pedido.css" />

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <header>
    <h1>Formatação de Pedido para Impressão</h1>
  </header>

  <main>
    <div class="card source">
      <label for="texto">Cole a mensagem completa do pedido recebido no WhatsApp ou use o botão “Colar da área de transferência”. Depois, clique em “Gerar tabelas”.</label>
      <textarea id="texto" placeholder="Cole o texto aqui"></textarea>

      <div class="row controls">
        <button class="btn" id="btnParse">Gerar tabelas</button>
        <button class="btn secondary" id="btnClipboard">Colar da área de transferência</button>
        <span class="muted" id="infoCategorias"></span>
      </div>
    </div>

    <div class="card card-space">
      <div class="row row-between">
        <div><strong>Resumo do Pedido</strong></div>
        <div id="meta">Data: —  |  Nome: —  |  Loja: —</div>
      </div>

      <div id="tabelasContainer"></div>

      <div class="row controls row-top">
        <button class="btn" id="btnPrint" style="display:none">Imprimir (Salvar como PDF)</button>
        <button class="btn secondary" id="btnJsPdf" style="display:none">Baixar PDF (arquivo)</button>
      </div>
    </div>
  </main>

  <script src="../assets/js/formatar-pedido.js"></script>
</body>
</html>
